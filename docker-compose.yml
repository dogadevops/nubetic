services:
  nubetic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nubetic-app
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      # API Key from .env - in production use docker secrets
      - TRWQ_API_KEY=${TRWQ_API_KEY}
    # Volume to persist TRWQ config between container restarts
    volumes:
      - ./src/data:/app/src/data
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nubetic-network

networks:
  nubetic-network:
    driver: bridge